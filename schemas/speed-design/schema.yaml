name: speed-design
version: 1
description: Lean workflow - design → specs → tasks (no proposal)
artifacts:
  - id: design
    generates: design.md
    description: Design document — the authoritative starting point for the change
    template: design.md
    instruction: |
      Create the design document that establishes the intent and approach for this change.

      This is the entry point for the speed-design workflow — there is no proposal.
      The agent should gather context from the codebase and conversation before writing.

      Sections:
      - **Context**: Background, current state, constraints. What exists today? What's driving this change?
      - **Goals / Non-Goals**: What this change achieves and explicitly excludes.
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Open Questions**: Outstanding decisions or unknowns to resolve before or during implementation.

      Focus on architecture and approach, not line-by-line implementation.
      This document will drive the specs — be clear about what the system should do, not just how.

      Good design docs explain the "why" behind technical decisions.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Full requirement specifications derived from the design
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do, derived from the design document.

      This is NOT a delta spec (no ADDED/MODIFIED/REMOVED sections). Write full, standalone requirements.

      Create one spec file per capability or concern identified in the design.
      Use kebab-case folder names: specs/<capability>/spec.md

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`).
      - Every requirement MUST have at least one scenario.

      Example:
      ```
      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data
      ```

      Reference the design document as the source of truth for what to specify.
      Specs should be testable — each scenario is a potential test case.
    requires:
      - design

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Example:
      ```
      ## 1. Setup

      - [ ] 1.1 Create new module structure
      - [ ] 1.2 Add dependencies to package.json

      ## 2. Core Implementation

      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable — you know when it's done.
    requires:
      - specs

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
